name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Sanitize Hostname
      id: sanitize
      run: |
        RAW_HOST="${{ secrets.SSH_HOST || secrets.HOST }}"
        if [ -z "$RAW_HOST" ]; then
          echo "ERROR: Host secret is empty!"
          exit 1
        fi
        CLEAN_HOST=$(echo "$RAW_HOST" | sed -e 's|^https://||' -e 's|^http://||' -e 's|/.*$||' -e 's|:.*$||' -e 's|[[:space:]]||g')
        echo "Clean Hostname: $CLEAN_HOST"
        echo "CLEAN_HOST=$CLEAN_HOST" >> $GITHUB_ENV

    - name: Run deployment commands via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ env.CLEAN_HOST }}
        username: ${{ secrets.SSH_USER || secrets.SSH_USERNAME || secrets.USER || secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY || secrets.KEY }}
        passphrase: ${{ secrets.SSH_PASSPHRASE || secrets.PASSPHRASE }}
        port: ${{ secrets.SSH_PORT || secrets.PORT || '22' }}
        script: |
          # Go to server path
          mkdir -p /var/www/seo-optimizer
          cd /var/www/seo-optimizer
          
          # Pull latest code from GitHub
          if [ ! -d ".git" ]; then
            git clone https://github.com/hnelke/seo-optimizer.git .
          else
            git fetch origin main
            git reset --hard origin/main
          fi
          
          # Delete temporary debug file from previous runs if any
          rm -f static/debug_services.txt
          
          # Setup python environment using existing 'venv' folder
          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi
          source venv/bin/activate
          pip install -r requirements.txt
          
          # Kill running process on port 8001
          PID=$(lsof -t -i:8001 || fuser -n tcp 8001 2>/dev/null || pgrep -f "port 8001")
          if [ -n "$PID" ]; then
            echo "Killing running process: $PID"
            kill -9 $PID
            sleep 1
          fi
          
          # Restart uvicorn in the background using nohup
          echo "Starting uvicorn server on port 8001..."
          nohup venv/bin/uvicorn main:app --host 0.0.0.0 --port 8001 > uvicorn.log 2>&1 &
          
          echo "Deployment completed successfully."
