name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Server via SSH/rsync
      uses: easingthemes/ssh-deploy@main
      with:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        ARGS: "-rlgoDzvc --delete"
        SOURCE: "./"
        REMOTE_HOST: ${{ secrets.SSH_HOST }}
        REMOTE_USER: ${{ secrets.SSH_USER }}
        REMOTE_PORT: ${{ secrets.SSH_PORT || '22' }}
        TARGET: "/var/www/seo-optimizer"
        EXCLUDE: "/.git/, /.github/, /.venv/, /__pycache__/, /reports.json, /.env, /run.bat, /scratch_search_js.py"

    - name: Run post-deployment commands
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || '22' }}
        script: |
          cd /var/www/seo-optimizer
          if [ ! -d ".venv" ]; then
            python3 -m venv .venv
          fi
          source .venv/bin/activate
          pip install -r requirements.txt
          
          # Try to restart the seo-optimizer systemd service if it exists (system-wide or user-wide)
          if systemctl is-active --quiet seo-optimizer; then
            sudo systemctl restart seo-optimizer
            echo "seo-optimizer systemd service restarted."
          elif systemctl --user is-active --quiet seo-optimizer; then
            systemctl --user restart seo-optimizer
            echo "seo-optimizer user-level systemd service restarted."
          else
            echo "No active systemd service 'seo-optimizer' found. If you use pm2 or another process manager, please configure its restart here."
          fi
