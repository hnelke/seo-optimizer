name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Sanitize Hostname
      id: sanitize
      run: |
        RAW_HOST="${{ secrets.SSH_HOST || secrets.HOST }}"
        if [ -z "$RAW_HOST" ]; then
          echo "ERROR: Host secret is empty!"
          exit 1
        fi
        CLEAN_HOST=$(echo "$RAW_HOST" | sed -e 's|^https://||' -e 's|^http://||' -e 's|/.*$||' -e 's|:.*$||' -e 's|[[:space:]]||g')
        echo "Clean Hostname: $CLEAN_HOST"
        echo "CLEAN_HOST=$CLEAN_HOST" >> $GITHUB_ENV

    - name: Run deployment commands via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ env.CLEAN_HOST }}
        username: ${{ secrets.SSH_USER || secrets.SSH_USERNAME || secrets.USER || secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY || secrets.KEY }}
        passphrase: ${{ secrets.SSH_PASSPHRASE || secrets.PASSPHRASE }}
        port: ${{ secrets.SSH_PORT || secrets.PORT || '22' }}
        script: |
          mkdir -p /var/www/seo-optimizer
          cd /var/www/seo-optimizer
          
          if [ ! -d ".git" ]; then
            git clone https://github.com/hnelke/seo-optimizer.git .
          else
            git fetch origin main
            git reset --hard origin/main
          fi
          
          if [ ! -d ".venv" ]; then
            python3 -m venv .venv
          fi
          source .venv/bin/activate
          pip install -r requirements.txt
          
          # DIAGNOSTICS: Write services and running python processes to static file
          echo "=== SYSTEMD SERVICES ===" > static/debug_services.txt
          systemctl list-units --type=service --all | grep -E "seo|optimizer|uwsgi|nginx|uvicorn|fastapi|service" >> static/debug_services.txt || true
          echo "=== RUNNING PROCESSES ===" >> static/debug_services.txt
          ps aux | grep -E "python|uvicorn|gunicorn" >> static/debug_services.txt || true
          
          # Try to restart the service (check different possible names)
          if systemctl is-active --quiet seo-optimizer; then
            sudo systemctl restart seo-optimizer
            echo "seo-optimizer systemd service restarted." >> static/debug_services.txt
          elif systemctl is-active --quiet seo; then
            sudo systemctl restart seo
            echo "seo systemd service restarted." >> static/debug_services.txt
          elif systemctl --user is-active --quiet seo-optimizer; then
            systemctl --user restart seo-optimizer
            echo "seo-optimizer user-level systemd service restarted." >> static/debug_services.txt
          elif systemctl --user is-active --quiet seo; then
            systemctl --user restart seo
            echo "seo user-level systemd service restarted." >> static/debug_services.txt
          else
            echo "No active service found. Searching for service files..." >> static/debug_services.txt
            find /etc/systemd/system/ /lib/systemd/system/ -name "*seo*" >> static/debug_services.txt || true
          fi
