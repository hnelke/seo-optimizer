name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Run deployment commands via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST || secrets.HOST }}
        username: ${{ secrets.SSH_USER || secrets.SSH_USERNAME || secrets.USER || secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY || secrets.KEY }}
        port: ${{ secrets.SSH_PORT || secrets.PORT || '22' }}
        script: |
          # Go to the server path
          mkdir -p /var/www/seo-optimizer
          cd /var/www/seo-optimizer
          
          # Initialize or pull the latest code from GitHub
          if [ ! -d ".git" ]; then
            echo "Directory is not a git repository. Cloning..."
            git clone https://github.com/hnelke/seo-optimizer.git .
          else
            echo "Git repository found. Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main
          fi
          
          # Setup virtual environment and install dependencies
          if [ ! -d ".venv" ]; then
            echo "Creating virtual environment..."
            python3 -m venv .venv
          fi
          source .venv/bin/activate
          pip install -r requirements.txt
          
          # Restart the service if it exists (system-wide or user-level)
          if systemctl is-active --quiet seo-optimizer; then
            sudo systemctl restart seo-optimizer
            echo "seo-optimizer systemd service restarted."
          elif systemctl --user is-active --quiet seo-optimizer; then
            systemctl --user restart seo-optimizer
            echo "seo-optimizer user-level systemd service restarted."
          else
            echo "No active systemd service 'seo-optimizer' found. Restart the process manually or configure systemd."
          fi
