name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Sanitize Hostname
      id: sanitize
      run: |
        RAW_HOST="${{ secrets.SSH_HOST || secrets.HOST }}"
        if [ -z "$RAW_HOST" ]; then
          echo "ERROR: Host secret is empty!"
          exit 1
        fi
        CLEAN_HOST=$(echo "$RAW_HOST" | sed -e 's|^https://||' -e 's|^http://||' -e 's|/.*$||' -e 's|:.*$||' -e 's|[[:space:]]||g')
        echo "Clean Hostname: $CLEAN_HOST"
        echo "CLEAN_HOST=$CLEAN_HOST" >> $GITHUB_ENV

    - name: Run deployment commands via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ env.CLEAN_HOST }}
        username: ${{ secrets.SSH_USER || secrets.SSH_USERNAME || secrets.USER || secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY || secrets.KEY }}
        passphrase: ${{ secrets.SSH_PASSPHRASE || secrets.PASSPHRASE }}
        port: ${{ secrets.SSH_PORT || secrets.PORT || '22' }}
        script: |
          mkdir -p /var/www/seo-optimizer
          cd /var/www/seo-optimizer
          
          if [ ! -d ".git" ]; then
            git clone https://github.com/hnelke/seo-optimizer.git .
          else
            git fetch origin main
            git reset --hard origin/main
          fi
          
          # DIAGNOSTICS: check how process 62496 is running (or any process running port 8001)
          PID=$(pgrep -f "port 8001" | head -n 1)
          if [ -z "$PID" ]; then
            PID=$(pgrep -f "main:app.*8001" | head -n 1)
          fi
          
          echo "=== PORT 8001 PROCESS DIAGNOSTICS ===" > static/debug_services.txt
          if [ -n "$PID" ]; then
            echo "Found process PID: $PID" >> static/debug_services.txt
            echo "--- status ---" >> static/debug_services.txt
            cat /proc/$PID/status | grep -E "PPid|Name" >> static/debug_services.txt || true
            echo "--- cgroup ---" >> static/debug_services.txt
            cat /proc/$PID/cgroup >> static/debug_services.txt || true
            echo "--- command ---" >> static/debug_services.txt
            cat /proc/$PID/cmdline | tr '\0' ' ' >> static/debug_services.txt || true
            echo "" >> static/debug_services.txt
          else
            echo "No process found on port 8001" >> static/debug_services.txt
          fi
          
          # List all systemd unit files on the system to find the correct service name
          echo "=== SYSTEMD UNIT FILES ===" >> static/debug_services.txt
          find /etc/systemd/system/ -name "*.service" >> static/debug_services.txt || true
          
          # Try to restart
          # We will read this log later to see what the cgroup/unit name is!
